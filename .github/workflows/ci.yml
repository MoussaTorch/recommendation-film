name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install numpy==1.26.4 cython
          python -m pip install scikit-surprise==1.1.3 --no-build-isolation
          python -m pip install "setuptools<70"
          python -m pip install -r requirements.txt
          python -m pip install -r interface/requirements.txt

      - name: Prepare data pipeline
        run: |
          python src/data_loader.py
          python src/features.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Validate DVC pipeline
        run: dvc dag

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cinerec-api .

      - name: Smoke test API container
        run: |
          docker run -d --name cinerec-test -p 8000:8000 cinerec-api
          sleep 8
          curl -fsS http://localhost:8000/api/health
          curl -fsS http://localhost:8000/docs
          docker stop cinerec-test
